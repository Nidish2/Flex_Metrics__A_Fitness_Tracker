spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

server:
  port: ${PORT:8080}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30m

application:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 86400000
    rate-limit:
      window-ms: ${RATE_LIMIT_WINDOW_MS:60000}
      max-requests: ${RATE_LIMIT_MAX_REQUESTS:30}
    bootstrap-admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${BOOTSTRAP_ADMIN_EMAIL:}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
      first-name: ${BOOTSTRAP_ADMIN_FIRST_NAME:Admin}
      last-name: ${BOOTSTRAP_ADMIN_LAST_NAME:User}

logging:
  structured:
    format:
      console: logstash

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
